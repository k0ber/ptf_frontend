name: Mobile Quality

on:
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitignore'

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  common_env:
    uses: ./.github/workflows/_common_env.yml

  quality-check:
    needs: common_env
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 0

      - name: Configure Git for Self-Hosted
        run: |
          git config --global credential.helper ""
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Unit Tests
        run: ./gradlew :composeApp:jvmTest --continue

      - name: Run Macrobenchmarks
        run: ./gradlew :benchmark:connectedBenchmarkBenchmarkAndroidTest --continue

      - name: Validate Benchmark Results
        run: |
          REPORT_DIR="benchmark/build/outputs/connected_android_test_additional_output"
          if [ -z "$(find "$REPORT_DIR" -name "*.json" 2>/dev/null)" ]; then
            echo "❌ ERROR: No benchmark results found! Check device connection."
            exit 1
          fi

      - name: Generate Compose Metrics
        run: |
          ./gradlew :androidApp:assembleDebug \
          -Pandroidx.compose.compiler.plugins.kotlin.metricsDestination=${{ github.workspace }}/build/compose_compiler \
          -Pandroidx.compose.compiler.plugins.kotlin.reportsDestination=${{ github.workspace }}/build/compose_compiler

      - name: Collect All Results
        if: always()
        run: |
          mkdir -p build/allure-results
          
          # 2. Benchmarks
          BENCH_OUT="benchmark/build/outputs/connected_android_test_additional_output"
          FOUND_BENCH=$(find "$BENCH_OUT" -name "*.json" 2>/dev/null)
          
          if [ -z "$FOUND_BENCH" ]; then
             echo "⚠️ WARNING: No benchmark JSONs found."
             echo "[]" > build/allure-results/metrics.json
          else
             find "$BENCH_OUT" -name "*.json" -exec bash -c 'cp -v "$1" "build/allure-results/benchmark_$(basename "$1")"' -- {} \;
             echo "$FOUND_BENCH" | head -n 1 | xargs -I {} cp {} build/allure-results/metrics.json
          fi

          # 3. Compose Metrics
          if [ -d "build/compose_compiler" ]; then
            find build/compose_compiler -name "*-classes.txt" -exec cp {} build/allure-results/compose-classes.txt \; || true
            find build/compose_compiler -name "*-composables.txt" -exec cp {} build/allure-results/compose-composables.txt \; || true
            find build/compose_compiler -name "*.json" -exec cp {} build/allure-results/compose-metrics.json \; || true
          fi

          # 4. Environment
          {
            echo "Runner=${{ runner.name }}"
            echo "OS=${{ runner.os }}"
            echo "Branch=${{ github.head_ref || github.ref_name }}"
          } > build/allure-results/environment.properties

      - name: Performance Regression Check
        uses: benchmark-action/github-action-benchmark@v1
        if: always()
        with:
          tool: 'googlecpp'
          output-file-path: build/allure-results/metrics.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-on-alert: true
          auto-push: false
          fail-on-alert: true
          alert-threshold: '120%'
          benchmark-data-dir-path: dev/bench

      - name: Load Allure history
        uses: actions/checkout@v4
        if: always()
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report
        if: always()
        run: |
          if [ -d "gh-pages/mobile/history" ]; then
            mkdir -p build/allure-results/history
            cp -r gh-pages/mobile/history/* build/allure-results/history/
          fi
          allure generate build/allure-results -o allure-report --clean

      - name: Deploy Reports to GH Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          destination_dir: mobile/${{ github.run_number }}
          keep_files: true

      - name: Update Latest Redirect
        if: always()
        run: |
          mkdir -p allure-report-latest
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0; url=./${{ github.run_number }}/" /></head></html>' > allure-report-latest/index.html

      - name: Deploy Redirect to GH Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report-latest
          destination_dir: mobile
          keep_files: true

      - name: Post Allure Report link
        uses: thollander/actions-comment-pull-request@v2
        if: always()
        with:
          message: |
            **Allure Test Report:** 
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/mobile/${{ github.run_number }}/
            ---

      - name: Post cleanup
        if: always()
        run: |
          ./gradlew --stop
          rm -rf $HOME/actions_github_pages_* || true
          rm -rf build/
          rm -rf benchmark/build/
          rm -rf composeApp/build/
          rm -rf gh-pages/
