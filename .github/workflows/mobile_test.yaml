name: Mobile Quality

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitignore'

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  common_env:
    uses: ./.github/workflows/_common_env.yml

  quality-check:
    needs: common_env
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 0

      - name: Configure Git for Self-Hosted
        run: |
          git config --global credential.helper ""
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Unit Tests
        run: ./gradlew :composeApp:jvmTest --continue

      - name: Run Macrobenchmarks
        run: ./gradlew :benchmark:connectedBenchmarkBenchmarkAndroidTest --continue

      - name: Generate Compose Metrics
        run: ./gradlew :androidApp:assembleDebug

      - name: Collect All Results
        if: always()
        run: |
          mkdir -p build/allure-results
          
          # 1. Unit Tests (JVM)
          cp composeApp/build/test-results/jvmTest/*.xml build/allure-results/ || true
          
          # 2. Android UI Test Results
          find benchmark/build/outputs/androidTest-results -name "*.xml" -exec cp -v {} build/allure-results/ \; || true
          
          # 3. Benchmarks Metrics
          BENCH_OUT="benchmark/build/outputs/connected_android_test_additional_output"
          RAW_BENCH_JSON=$(find "$BENCH_OUT" -name "*.json" -not -name "*-*-*.json" -print -quit)
          
          if [ -n "$RAW_BENCH_JSON" ]; then
            cp "$RAW_BENCH_JSON" build/allure-results/benchmark_data.json
            cp "$RAW_BENCH_JSON" build/allure-results/metrics.json
            
            # Pickup Median benchmarks
            STARTUP=$(jq -r '.benchmarks[] | select(.name=="measureColdStartup") | .metrics.timeToInitialDisplayMs.median' "$RAW_BENCH_JSON" 2>/dev/null || echo "N/A")
            FRAMES=$(jq -r '.benchmarks[] | select(.name=="measureLoginToSignup") | .metrics.frameCount.median' "$RAW_BENCH_JSON" 2>/dev/null || echo "N/A")
            BENCH_SUMMARY="Median Startup: ${STARTUP}ms, Median Frames: ${FRAMES}"
          else
            echo "[]" > build/allure-results/metrics.json
            BENCH_SUMMARY="No benchmark data found"
          fi
          
          # 4. Compose Metrics
          find . -name "*-classes.txt" -not -path "*/_test-*" -exec cp -v {} build/allure-results/compose-classes.txt \; || true
          find . -name "*-composables.txt" -not -path "*/_test-*" -exec cp -v {} build/allure-results/compose-composables.txt \; || true
          find . -name "*.json" -path "*/compose_compiler/*" -exec cp -v {} build/allure-results/compose-metrics.json \; || true
          
          # Prevents empty files in Allure
          [ -s build/allure-results/compose-classes.txt ] || echo "No classes data found" > build/allure-results/compose-classes.txt
          [ -s build/allure-results/compose-composables.txt ] || echo "No composables data found" > build/allure-results/compose-composables.txt
          [ -s build/allure-results/compose-metrics.json ] || echo "{}" > build/allure-results/compose-metrics.json

          # 5. Создание синтетического теста Allure
          cat <<EOF > build/allure-results/performance-result.json
          {
            "uuid": "perf-$(date +%s)",
            "historyId": "performance-and-stability",
            "name": "Performance & Compose Metrics",
            "status": "passed",
            "stage": "finished",
            "description": "Device: Pixel 10 Pro XL. $BENCH_SUMMARY",
            "attachments": [
              { "name": "Compose Classes", "source": "compose-classes.txt", "type": "text/plain" },
              { "name": "Compose Composables", "source": "compose-composables.txt", "type": "text/plain" },
              { "name": "Compose Metrics JSON", "source": "compose-metrics.json", "type": "application/json" },
              { "name": "Macrobenchmark Raw JSON", "source": "benchmark_data.json", "type": "application/json" }
            ],
            "start": $(date +%s000),
            "stop": $(date +%s000)
          }
          EOF
          
          # 6. Executor info
          cat <<EOF > build/allure-results/executor.json
          {
            "name": "GitHub Actions",
            "type": "github",
            "reportName": "Mobile Quality Report",
            "buildName": "Run #${{ github.run_number }}",
            "buildOrder": "${{ github.run_number }}",
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportUrl": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/mobile/${{ github.run_number }}/"
          }
          EOF
          
          # 7. Environment info
          {
            echo "Runner=${{ runner.name }}"
            echo "OS=${{ runner.os }}"
            echo "Branch=${{ github.head_ref || github.ref_name }}"
          } > build/allure-results/environment.properties

      - name: Reset Git State
        run: git checkout .

      - name: Performance Regression Check
        uses: benchmark-action/github-action-benchmark@v1
        if: always()
        with:
          tool: 'googlecpp'
          output-file-path: build/allure-results/metrics.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          comment-on-alert: true
          save-data-file: true
          alert-threshold: '120%'
          benchmark-data-dir-path: dev/bench

      - name: Load Allure history
        uses: actions/checkout@v4
        if: always()
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report
        if: always()
        run: |
          if [ -d "gh-pages/mobile/history" ]; then
            mkdir -p build/allure-results/history
            cp -r gh-pages/mobile/history/* build/allure-results/history/
          fi
          allure generate build/allure-results -o allure-report --clean

      - name: Prepare Assets for Deployment
        if: always()
        run: |
          # Create folder structure as it should appear in gh-pages
          mkdir -p deploy_out/mobile/${{ github.run_number }}
          mkdir -p deploy_out/mobile/metrics
          mkdir -p deploy_out/dev/bench
          
          # 1. Copy Allure Report
          if [ -d "allure-report" ]; then
            cp -r allure-report/* deploy_out/mobile/${{ github.run_number }}/
          fi
          
          # 2. Copy Raw Metrics for direct links in PR
          cp build/allure-results/compose-metrics.json deploy_out/mobile/metrics/compose-metrics-${{ github.run_number }}.json || true
          cp build/allure-results/benchmark_data.json deploy_out/mobile/metrics/benchmark-${{ github.run_number }}.json || true
    
          # 3. Copy benchmark data for history
          if [ -d "dev/bench" ] && [ "$(ls -A dev/bench)" ]; then
            cp -r dev/bench/* deploy_out/dev/bench/
          fi
          
          # 3. Create a redirect link
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0; url=./${{ github.run_number }}/" /></head></html>' > deploy_out/mobile/index.html

      - name: Deploy to GH Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: deploy_out
          keep_files: true

      - name: Post Allure Report link
        uses: thollander/actions-comment-pull-request@v2
        if: always()
        with:
          message: |
            ### 📊 Test Quality Report
            - [Allure Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/mobile/${{ github.run_number }}/)
            - [Compose Metrics](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/mobile/metrics/compose-metrics-${{ github.run_number }}.json)
            - [Macrobenchmark](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/mobile/metrics/benchmark-${{ github.run_number }}.json)
          comment_tag: allure_report

      - name: Post cleanup
        if: always()
        run: |
          # restore after git checkout
          chmod +x gradlew || true
          ./gradlew --stop || true
          
          rm -rf $HOME/actions_github_pages_* || true
          
          rm -rf build/ allure-report/ deploy_out/ dev/bench/ gh-pages/
          rm -rf benchmark/build/ composeApp/build/ androidApp/build/
