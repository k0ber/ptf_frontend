name: Version Resolver

on:
  workflow_call:
    outputs:
      version_name:
        value: ${{ jobs.version.outputs.version_name }}
      version_code:
        value: ${{ jobs.version.outputs.version_code }}
      is_ci:
        value: "true"

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.vars.outputs.version_name }}
      version_code: ${{ steps.vars.outputs.version_code }}
      is_ci: "true"
    steps:
      - name: Determine Version
        id: vars
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            RAW_TAG="${{ github.ref_name }}"
            echo "version_name=${RAW_TAG#v}" >> $GITHUB_OUTPUT
            echo "version_code=${{ github.run_number }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BODY="${{ github.event.pull_request.body }}"
            TAG=$(echo "$BODY" | grep -oP '/release\s+\K(v[0-9]+\.[0-9]+\.[0-9]+)' || echo "")
            CLEAN_TAG=${TAG#v}
            echo "version_name=${CLEAN_TAG:-main}" >> $GITHUB_OUTPUT
            echo "version_code=${{ github.run_number }}" >> $GITHUB_OUTPUT
          else
            echo "version_name=dev" >> $GITHUB_OUTPUT
            echo "version_code=1" >> $GITHUB_OUTPUT
          fi
