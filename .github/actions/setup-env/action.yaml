name: 'Setup Environment'
description: 'Full environment preparation: Checkout, Git config, JDK and Versioning'

outputs:
  version_name:
    description: "Version name from gradle.properties"
    value: ${{ steps.vars.outputs.version_name }}
  version_code:
    description: "Build number from GitHub Run ID"
    value: ${{ steps.vars.outputs.version_code }}

runs:
  using: "composite"
  steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        clean: true
        fetch-depth: 0

    - name: Configure Git
      shell: bash
      run: |
        git config --global credential.helper ""
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Extract Version
      id: vars
      shell: bash
      run: |
        VERSION=$(grep '^versionName=' gradle.properties | cut -d'=' -f2)
        echo "version_name=$VERSION" >> $GITHUB_OUTPUT
        echo "version_code=${{ github.run_number }}" >> $GITHUB_OUTPUT